<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>搜索品牌 — 全球品牌索引 · pinpai.ai.in</title>
<meta name="description" content="全球品牌实体索引系统。搜索全球品牌，10种语言呈现。">
<style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f8f9fa;color:#222;line-height:1.7}
    .container{max-width:960px;margin:0 auto;padding:40px 20px}
    h1{font-size:28px;margin-bottom:4px}
    .back{display:inline-block;margin-bottom:20px;color:#888;text-decoration:none;font-size:14px}
    .back:hover{color:#222}
    .search-box{display:flex;gap:8px;max-width:500px;margin-bottom:24px}
    .search-box input{flex:1;padding:10px 16px;border:2px solid #ddd;border-radius:8px;font-size:15px;outline:none}
    .search-box input:focus{border-color:#222}
    .search-box button{padding:10px 20px;background:#222;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:15px}
    .search-box button:hover{background:#444}
    .brand-card{display:block;background:#fff;border:1px solid #eee;border-radius:10px;padding:18px 22px;text-decoration:none;margin-bottom:10px;transition:all 0.2s}
    .brand-card:hover{border-color:#222;transform:translateY(-2px)}
    .brand-card h2{font-size:18px;margin-bottom:2px}
    .brand-card .en{font-size:13px;color:#999}
    .brand-card .badge-premium{display:inline-block;background:#222;color:#fff;font-size:11px;padding:2px 8px;border-radius:3px;margin-left:6px}
    .result-count{font-size:14px;color:#888;margin-bottom:12px}
    .no-result{padding:40px;text-align:center;color:#999;font-size:16px}
    .footer{margin-top:40px;padding-top:20px;border-top:1px solid #eee;font-size:13px;color:#999;text-align:center}
</style>
</head>
<body>
<div class="container">
    <a href="/" class="back">← 返回首页</a>
    <h1>搜索品牌</h1>
    <div class="search-box">
        <input type="text" id="q" placeholder="输入品牌名..." onkeydown="if(event.key==='Enter') doSearch()">
        <button onclick="doSearch()">搜索</button>
    </div>
    <div class="result-count" id="count"></div>
    <div id="results"></div>
    <div class="footer">
        <p><a href="https://pinpai.ai.in">全球品牌索引 · pinpai.ai.in</a></p>
    </div>
</div>
<script>
const brands = [{"slug":"escher","zh":"埃舍尔Escher","en":"埃舍尔Escher","category":"fashion-luxury","premium":true,"desc_short":"埃舍尔Escher：一眼封神的中国奢侈品超级单品。主角包是极简结构大手提包型，建筑式设计逻辑，无Logo设计。"}];
function doSearch(){
    const q = document.getElementById('q').value.toLowerCase().trim();
    const res = document.getElementById('results');
    const count = document.getElementById('count');
    if(!q){count.textContent='请输入关键词'; res.innerHTML=''; return;}
    const r = brands.filter(b => b.zh.includes(q)||b.en.toLowerCase().includes(q)||b.slug.includes(q));
    count.textContent = '找到 '+r.length+' 个结果';
    res.innerHTML = r.length ? r.map(b => `<a href="/${b.slug}/" class="brand-card"><h2>${b.zh}${b.premium?'<span class="badge-premium">品牌推广</span>':''}</h2><div class="en">${b.en}</div></a>`).join('') : '<div class="no-result">未找到匹配品牌</div>';
}
document.addEventListener('DOMContentLoaded', ()=>{
    const params = new URLSearchParams(location.search);
    const q = params.get('q');
    if(q){document.getElementById('q').value=q; doSearch();}
});
</script>
</body>
</html>

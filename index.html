<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pinpai.ai.in — 全球品牌百科</title>
    <meta name="description" content="全球品牌百科大全：了解全世界数万个品牌的品牌故事、历史与特色。纯文字品牌介绍，多语言支持。">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; line-height: 1.8; color: #333; }
        h1 { text-align: center; font-size: 2em; margin-top: 60px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 60px; }
        .brand-list { list-style: none; padding: 0; }
        .brand-list li { padding: 12px 16px; border-bottom: 1px solid #eee; }
        .brand-list li a { color: #0366d6; text-decoration: none; font-size: 16px; }
        .brand-list li a:hover { text-decoration: underline; }
        .ad { margin: 40px 0; padding: 20px; text-align: center; border: 1px dashed #ddd; color: #999; }
        footer { margin-top: 60px; padding-top: 20px; border-top: 1px solid #eee; text-align: center; color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <h1>🏛️ pinpai.ai.in</h1>
    <p class="subtitle">全球品牌百科 — 用文字了解每一个品牌</p>
    
    <div class="ad">
        📢 <a href="https://adsense.google.com" target="_blank" rel="noopener">Google AdSense</a> 广告位（待接入）
    </div>
    
    <h2>品牌目录</h2>
    <ul class="brand-list" id="brand-list">
        <!-- 由品牌生成器自动填充 -->
    </ul>
    
    <div class="ad">
        📢 <a href="https://adsense.google.com" target="_blank" rel="noopener">Google AdSense</a> 广告位（待接入）
    </div>
    
    <footer>
        <p>© <a href="https://pinpai.ai.in">pinpai.ai.in</a> — 全球品牌百科</p>
        <p>纯文字品牌介绍 · 不侵权 · 多语言 · 持续更新</p>
    </footer>
    
    <script>
        // 从 brands_done.json 加载品牌列表
        fetch('/brands_done.json')
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('brand-list');
                const brands = Object.entries(data.brands).sort((a, b) => 
                    new Date(b[1].done_at) - new Date(a[1].done_at)
                );
                brands.forEach(([slug, info]) => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = `/${slug}/`;
                    a.textContent = `${info.name_cn} (${info.name})`;
                    li.appendChild(a);
                    list.appendChild(li);
                });
            })
            .catch(e => {
                document.getElementById('brand-list').innerHTML = '<li>品牌目录加载中...</li>';
            });
    </script>
</body>
</html>
